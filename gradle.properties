# JVM heap for Gradle. KSP + Room codegen need headroom; bumped to 4G.
# Metaspace cap prevents the slow leak that pushes memory off the slab.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

# Parallel + cache + configuration-cache = 2-4x faster incremental builds.
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.daemon=true

# KSP performs better with incremental processing on.
ksp.incremental=true

# Android baseline
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
